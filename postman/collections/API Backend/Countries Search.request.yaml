$kind: http-request
name: Countries Search
method: GET
url: '{{baseUrl}}/api/countries'
order: 4000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
queryParams:
  - key: name
    value: slovenia
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response contains countries array", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property('countries');
          pm.expect(jsonData.countries).to.be.an('array');
      });

      pm.test("Response contains count", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property('count');
          pm.expect(jsonData.count).to.be.a('number');
      });

      pm.test("Countries have simplified structure", function () {
          const jsonData = pm.response.json();
          if (jsonData.countries.length > 0) {
              const country = jsonData.countries[0];
              pm.expect(country).to.have.property('name');
              pm.expect(country).to.have.property('capital');
              pm.expect(country).to.have.property('region');
              pm.expect(country).to.have.property('population');
              pm.expect(country).to.have.property('languages');
              pm.expect(country).to.have.property('currencies');
          }
      });

      pm.test("Count matches countries array length", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData.count).to.eql(jsonData.countries.length);
      });
